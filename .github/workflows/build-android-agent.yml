name: Build Android Agent APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'android-agent/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release with the APKs'
        type: boolean
        default: false

jobs:
  build:
    name: Build Debug & Release APKs
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Xmx4096m -Dkotlin.daemon.jvm.options=-Xmx2048m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      # Gradle / AGP siguen mirando ANDROID_HOME en muchos setups; setup-android define ANDROID_SDK_ROOT
      - name: Export ANDROID_HOME for Gradle
        shell: bash
        run: |
          if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
            echo "::error::ANDROID_SDK_ROOT no esta definido tras setup-android"
            exit 1
          fi
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"

      - name: Make gradlew executable
        working-directory: android-agent
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Build Debug APK
        working-directory: android-agent
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-assemble-debug.log

      - name: Build Release APK (unsigned)
        working-directory: android-agent
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-assemble-release.log

      - name: Gradle log tail (on failure)
        if: failure()
        working-directory: android-agent
        shell: bash
        run: |
          echo "---- assembleDebug (tail) ----"
          tail -n 120 gradle-assemble-debug.log 2>/dev/null || true
          echo "---- assembleRelease (tail) ----"
          tail -n 120 gradle-assemble-release.log 2>/dev/null || true
          {
            echo "## assembleDebug (últimas líneas)"
            echo '```text'
            tail -n 200 gradle-assemble-debug.log 2>/dev/null || true
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Gradle logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-${{ github.run_id }}
          path: |
            android-agent/gradle-assemble-debug.log
            android-agent/gradle-assemble-release.log
          if-no-files-found: ignore

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mdm-agent-debug-${{ github.sha }}
          path: android-agent/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: mdm-agent-release-${{ github.sha }}
          path: android-agent/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: mdm-agent-debug-${{ github.sha }}
          path: apk/debug

      - name: Download Release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: mdm-agent-release-${{ github.sha }}
          path: apk/release

      - name: Get version name
        id: version
        working-directory: android-agent
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=MDM Agent v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            ## MDM Android Agent

            Automated build from commit ${{ github.sha }}.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `app-debug.apk` | Debug build — ready to sideload for testing |
            | `app-release-unsigned.apk` | Release build (unsigned) — sign before production use |

            ### Install (ADB)
            ```bash
            adb connect <TV-IP>:5555
            adb install app-debug.apk
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/android-agent/README.md) for full setup instructions.
          files: |
            apk/debug/app-debug.apk
            apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
